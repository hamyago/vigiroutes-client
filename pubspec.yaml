name: vigiroutes_client
description: VigiRoutes - Application motoriste
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3
  firebase_crashlytics: ^4.1.0
  dio: ^5.7.0
  web_socket_channel: ^3.0.1
  provider: ^6.1.2
  go_router: ^14.6.0
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.2.0
  percent_indicator: ^4.2.3
  timeago: ^3.7.0
  pinput: ^5.0.0
  intl_phone_field: ^3.2.0
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1
  image_picker: ^1.1.2
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  sqflite: ^2.4.0
  sqflite_android: ^2.4.0
  sqflite_common: ^2.5.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/raw/
  fonts:
    - family: Poppins
      fonts:
        - asset: fonts/Poppins-Regular.ttf
          weight: 400
        - asset: fonts/Poppins-Medium.ttf
          weight: 500
        - asset: fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: fonts/Poppins-Bold.ttf
          weight: 700
