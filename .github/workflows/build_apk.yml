name: Build VigiRoutes Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> android/local.properties

      - name: Create gradle.properties secrets
        run: |
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/gradle.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vigiroutes-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}"     >> android/key.properties
          echo "keyAlias=vigiroutes"                         >> android/key.properties
          echo "storeFile=app/vigiroutes-release.jks"        >> android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Debug embedding detection
        run: |
          echo "=== AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml
          echo "=== Fichiers android/ ==="
          find android/ -maxdepth 2 -type f
          flutter build apk --release 2>&1 || true

      - name: Build APK Release
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: vigiroutes-client-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30