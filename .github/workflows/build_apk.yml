name: Build VigiRoutes Client APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: stable
          cache: true

      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" >> android/local.properties

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/vigiroutes-release.jks

      - name: Create key.properties
        run: |
          echo "storePassword=${{ secrets.STORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=vigiroutes" >> android/key.properties
          echo "storeFile=app/vigiroutes-release.jks" >> android/key.properties

      - name: Flutter pub get
        run: flutter pub get

      - name: Remove duplicate MainActivity
        run: rm -rf android/app/src/main/kotlin/ci/oyopmt/vigiroutes/vigiroutes_client

      - name: Build APK Release
        run: flutter build apk --release
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: vigiroutes-client-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
